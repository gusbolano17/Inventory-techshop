services:
  backend:
    container_name: backend
    build: ./backend/demo
    env_file:
      - .env
    networks:
      - app-net

  frontend:
    container_name: frontend
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    external : true