<aside
  class="fixed top-0 left-0 h-screen flex flex-col bg-slate-800 border-r border-slate-700 transition-all duration-300 ease-in-out z-40"
  [ngClass]="{ '-translate-x-full w-0': collapsed(), 'w-60': !collapsed() }"
>
  <div class="flex items-center h-16 px-4 border-b border-slate-700 shrink-0">
    <div class="flex items-center gap-2">
      <div
        class="w-8 h-8 rounded-lg bg-teal-500 flex items-center justify-center shadow-lg shadow-teal-500/30"
      >
        <span class="text-white font-black text-sm">T</span>
      </div>
      <span
        class="text-white font-semibold text-sm tracking-wider uppercase whitespace-nowrap overflow-hidden"
        [ngClass]="{'hidden':collapsed(), 'block' : !collapsed()}"
      >
        Techman
      </span>
    </div>
    <div [ngClass]="{'hidden': collapsed(), 'block ml-auto': !collapsed()}">
      <button (click)="closedSidenav.emit()" class="text-slate-400 hover:text-white transition-colors">
        <span class="material-symbols-outlined text-[20px]">
          close
        </span>
      </button>
    </div>
  </div>

  <nav class="flex-1 py-4 overflow-y-auto overflow-x-hidden">
    <ul class="space-y-1 px-2">
      @for (item of menuItems(); track item.route) {
        <li>
          <a
            [routerLink]="item.route"
            routerLinkActive="bg-slate-700 text-teal-400"
            class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-200"
            [ngClass]="{'justify-center': collapsed()}"
            [title]="collapsed() ? item.label : ''"
          >
            <span class="material-symbols-outlined text-[20px] shrink-0">
              {{ item.icon }}
            </span>
            <span
              class="text-sm font-medium whitespace-nowrap overflow-hidden transition-opacity duration-200"
              [ngClass]="{'hidden':collapsed(), 'block' : !collapsed()}"
            >
              {{ item.label }}
            </span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="p-4 border-t border-slate-700 shrink-0">
    <a
      routerLink="/main/settings"
      class="flex items-center gap-3 px-3 py-2 rounded-lg text-slate-300 hover:bg-slate-700 hover:text-white transition-colors duration-200"
      [ngClass]="{'justify-center': collapsed()}"
    >
      <span class="material-symbols-outlined text-[20px] shrink-0">logout</span>
      <span
        class="text-sm font-medium whitespace-nowrap overflow-hidden"
        [ngClass]="{'hidden':collapsed(), 'block' : !collapsed()}"
      >
        Cerrar sesión
      </span>
    </a>
  </div>
</aside>
