<header class="h-16 bg-slate-800 flex items-center justify-between px-6 border-b border-slate-700 shrink-0 z-50">
  <div class="flex items-center gap-4 ml-15">
    <button (click)="toggleCollapse.emit()" class="text-slate-400 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
      </svg>
    </button>
    <h1 class="text-white font-semibold text-lg">{{ currentPage() }}</h1>
  </div>

  <div class="flex items-center gap-4">
    <span class="text-slate-400 text-sm">{{ formattedDate() }}</span>

    <button class="relative p-2 text-slate-400 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
      </svg>
      @if (notificationCount() > 0) {
        <span class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center">
          {{ notificationCount() }}
        </span>
      }
    </button>

    <div class="relative">
      <button
        (click)="toggleUserMenu()"
        class="flex items-center gap-3 p-1.5 rounded-lg hover:bg-slate-700 transition-colors"
      >
        <div class="w-8 h-8 rounded-full bg-teal-500 flex items-center justify-center">
          <span class="text-white text-sm font-medium">{{ user.initials }}</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-4 text-slate-400">
          <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
        </svg>
      </button>

      @if (showUserMenu()) {
        <div class="absolute right-0 mt-2 w-48 bg-slate-700 rounded-lg shadow-lg border border-slate-600 py-1 z-50">
          <div class="px-4 py-2 border-b border-slate-600">
            <p class="text-white text-sm font-medium">{{ user.name }}</p>
            <p class="text-slate-400 text-xs">{{ user.email }}</p>
          </div>
          <a href="#" class="block px-4 py-2 text-sm text-slate-300 hover:bg-slate-600 hover:text-white">
            Perfil
          </a>
          <a href="#" class="block px-4 py-2 text-sm text-slate-300 hover:bg-slate-600 hover:text-white">
            Configuración
          </a>
          <div class="border-t border-slate-600 mt-1 pt-1">
            <a href="#" class="block px-4 py-2 text-sm text-red-400 hover:bg-slate-600">
              Cerrar sesión
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</header>
