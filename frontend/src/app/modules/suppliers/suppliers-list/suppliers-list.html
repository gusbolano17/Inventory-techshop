<!-- Filtros de búsqueda -->
<div class="bg-slate-700/50 rounded-lg p-4 mb-6">
  <h3 class="text-white font-medium mb-4">Filtros de búsqueda</h3>
  <form class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- Nombre -->
    <div class="flex flex-col gap-1">
      <label for="filterName" class="text-slate-400 text-sm">Nombre</label>
      <input
        type="text"
        id="filterName"
        placeholder="Buscar por nombre..."
        class="bg-slate-700 border border-slate-600 text-white rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
        [formField]="filterForm.name"
        (keyup.enter)="onFilter($event)"
      >
    </div>

    <!-- Tax ID -->
    <div class="flex flex-col gap-1">
      <label for="filterTaxId" class="text-slate-400 text-sm">Tax ID</label>
      <input
        type="text"
        id="filterTaxId"
        placeholder="NIT/RUC..."
        class="bg-slate-700 border border-slate-600 text-white rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
        [formField]="filterForm.taxId"
        (keyup.enter)="onFilter($event)"
      >
    </div>

    <!-- Estado -->
    <div class="flex flex-col gap-1">
      <label for="filterActive" class="text-slate-400 text-sm">Estado</label>
      <select
        id="filterActive"
        class="bg-slate-700 border border-slate-600 text-white rounded-lg p-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
        (change)="onActiveChange($event)"
      >
        <option value="">Todos</option>
        <option value="true">Activo</option>
        <option value="false">Inactivo</option>
      </select>
    </div>

    <!-- Botón limpiar -->
    <div class="flex items-end">
      <button
        type="button"
        (click)="clearFilters()"
        class="w-full px-4 py-2 bg-slate-600 hover:bg-slate-500 text-white rounded-lg text-sm transition-colors"
      >
        Limpiar
      </button>
    </div>
  </form>
</div>

<!-- Tabla de proveedores -->
<div class="overflow-x-auto">
  <table class="w-full">
    <thead class="bg-slate-700/50">
      <tr>
        <th class="px-4 py-3 text-left text-slate-400 text-sm font-medium">Nombre</th>
        <th class="px-4 py-3 text-left text-slate-400 text-sm font-medium">Tax ID</th>
        <th class="px-4 py-3 text-left text-slate-400 text-sm font-medium">Email</th>
        <th class="px-4 py-3 text-left text-slate-400 text-sm font-medium">Teléfono</th>
        <th class="px-4 py-3 text-center text-slate-400 text-sm font-medium">Estado</th>
        <th class="px-4 py-3 text-center text-slate-400 text-sm font-medium">Acciones</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-700">
      @for (supplier of suppliers(); track supplier.id) {
        <tr class="hover:bg-slate-700/30 transition-colors even:bg-slate-700/20">
          <td class="px-5 py-4 text-white font-medium">{{ supplier.name }}</td>
          <td class="px-5 py-4 text-slate-300 font-mono text-sm">{{ supplier.taxId }}</td>
          <td class="px-5 py-4 text-slate-300">{{ supplier.email }}</td>
          <td class="px-5 py-4 text-slate-300">{{ supplier.phone }}</td>
          <td class="px-5 py-4 text-center">
            <span
              class="px-2 py-1 rounded-full text-xs font-medium"
              [class]="supplier.active ? 'bg-teal-500/20 text-teal-400' : 'bg-red-500/20 text-red-400'"
            >
              {{ supplier.active ? 'Activo' : 'Inactivo' }}
            </span>
          </td>
          <td class="px-5 py-4">
            <div class="flex justify-center gap-2">
              <button
                (click)="edit.emit(supplier.id)"
                class="bg-teal-500 text-white px-3 py-1 rounded-lg hover:bg-teal-600 transition-colors"
              >
                <span class="material-symbols-outlined text-sm">edit</span>
              </button>
              <button
                (click)="deleteSupplier(supplier.id)"
                class="bg-red-500 text-white px-3 py-1 rounded-lg hover:bg-red-600 transition-colors"
              >
                <span class="material-symbols-outlined text-sm">delete</span>
              </button>
            </div>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="6" class="px-5 py-8 text-center text-slate-400">
            No hay proveedores registrados
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
